name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Ruff
        run: ruff check src tests

      - name: MyPy
        run: mypy src

      - name: Tests
        run: pytest -q --cov=cognitiveio --cov-report=term-missing

      - name: Demo smoke
        run: PYTHONPATH=src python -m cognitiveio.cli demo
